<!DOCTYPE html>
<html>
<head>
  <title>Morning Update</title>
</head>
<body>
  <h1>Your Daily Dashboard</h1>

  <h2>Weather</h2>
  <p>Check your local weather manually for now.</p>

  <h2>Inspirational Quote</h2>
  <p>Keep going. Small steps still count.</p>

  <h2>DBT Skill Reminder</h2>
  <p>Pause, breathe, observe, then choose your next action.</p>

  <h2>Upcoming Events</h2>
  <ul>
    <li>No events added yet.</li>
  </ul>

  <h2>Task List</h2>
  <ul id="tasks">
    <li>Loading tasks…</li>
  </ul>

  <script>
    fetch("tasks.json")
      .then(response => response.json())
      .then(tasks => {
        const list = document.getElementById("tasks");
        list.innerHTML = "";
        tasks.forEach(task => {
          const li = document.createElement("li");
          li.textContent = task;
          list.appendChild(li);
        });
      })
      .catch(error => {
        document.getElementById("tasks").innerHTML =
          "<li>Could not load tasks.json</li>";
      });
  </script>
</body>
</html>
